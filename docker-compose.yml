version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: assessment_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d assessment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    environment:
      MODEL_PATH: /app/models/mistral-7b-instruct-v0.1.Q4_K_S.gguf
      PASSING_THRESHOLD: 0.6
      CONFIDENCE_THRESHOLD: 0.7
    volumes:
      - ./models:/app/models
    ports:
      - "8001:8001"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://admin:secret@postgres:5432/assessment_db
      AI_SERVICE_URL: http://ai-service:8001
      SECRET_KEY: your-secret-key
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
